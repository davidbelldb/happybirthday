<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday!</title>
    <style>
        body { 
            background: #0f0f0f; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .card {
            text-align: center;
            padding: 20px;
        }
        h1 { font-size: 2rem; margin-bottom: 20px; }
        button { 
            padding: 20px 50px; 
            font-size: 1.5rem; 
            cursor: pointer; 
            border-radius: 40px; 
            border: none; 
            background: linear-gradient(45deg, #ff4757, #ff6b81); 
            color: white; 
            font-weight: bold; 
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.95); }
        .status { margin-top: 20px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎂 Tap to open your gift!</h1>
        <button id="playBtn">OPEN 🎁</button>
        <div id="status" class="status"></div>
    </div>

    <audio id="myAudio" preload="auto">
        <source src="https://raw.githubusercontent.com/davidbelldb/happybirthday/main/birthday%20flute.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('myAudio');
        const btn = document.getElementById('playBtn');
        const status = document.getElementById('status');

        btn.addEventListener('click', () => {
            status.innerText = "Loading flute...";
            
            audio.play().then(() => {
                btn.innerText = "🎵 Playing...";
                btn.style.background = "#2ed573";
                status.innerText = "";
            }).catch((error) => {
                console.error("Playback failed:", error);
