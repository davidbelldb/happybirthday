<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Katie!</title>
    <style>
        body { 
            background: #4b0082; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            overflow: hidden;
        }

        /* Container that slides everything up to make room */
        .card {
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Slide effect class */
        .slide-up { transform: translateY(-80px); }

        .headline { 
            font-size: 2.2rem; 
            font-weight: bold; 
            color: white;
            line-height: 1.2;
            margin: 0;
        }

        button { 
            padding: 22px 60px; 
            font-size: 1.6rem; 
            cursor: pointer; 
            border-radius: 12px; 
            border: none; 
            background: #fa233b; 
            color: white; 
            font-weight: bold; 
            transition: all 0.5s ease;
            -webkit-tap-highlight-color: transparent;
            min-width: 280px;
            z-index: 2;
        }

        .status { 
            font-size: 1.2rem; 
            font-style: italic; 
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* Fade-in animation for individual words */
        .word {
            display: inline-block;
            opacity: 0;
            transition: opacity 0.8s ease;
            margin: 0 5px;
        }

        .fade-in { opacity: 1 !important; }

    </style>
</head>
<body>

    <div id="mainCard" class="card">
        <div class="headline">For the woman who has everything</div>
        
        <button id="playBtn">tap here</button>
        
        <div id="status" class="status">pure magic!</div>
        
        <div id="bdayContainer" class="headline">
            <span class="word">Happy</span>
            <span class="word">Birthday,</span>
            <span class="word">Katie!</span>
        </div>
    </div>

    <audio id="myAudio" preload="auto">
        <source src="shitty_birthday_flute.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('myAudio');
        const btn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        const card = document.getElementById('mainCard');
        const words = document.querySelectorAll('.word');

        btn.addEventListener('click', function() {
            audio.play().then(() => {
                // 1. Slide the whole card up
                card.classList.add('slide-up');

                // 2. Change button text and color
                btn.innerText = "I know, it's awful";
                btn.style.background = "rgba(255, 255, 255, 0.1)";
                
                // 3. Fade in the "pure magic!" text
                status.style.opacity = "0.9";

                // 4. Fade in "Happy Birthday, Katie!" word by word
                words.forEach((word, index) => {
                    setTimeout(() => {
                        word.classList.add('fade-in');
                    }, 800 + (index * 600)); // Delay starts after slide, then 600ms per word
                });

            }).catch((error) => {
                console.log("Error:", error);
            });
        }, { once: true });
    </script>

</body>
</html>
