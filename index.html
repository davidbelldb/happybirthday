<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Katie!</title>
    <style>
        body { 
            background: #4b0082; /* Deep Purple */
            color: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            text-align: center;
        }
        .card { width: 90%; }
        
        /* The Large White Bold Style */
        .big-text { 
            font-size: 2.2rem; 
            font-weight: bold; 
            color: white; 
            margin: 20px 0;
            line-height: 1.2;
        }

        button { 
            padding: 22px 60px; 
            font-size: 1.6rem; 
            cursor: pointer; 
            border-radius: 50px; 
            border: none; 
            background: #ff0436; /* Red Button */
            color: white; 
            font-weight: bold; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .sub-text { 
            margin-top: 25px; 
            font-size: 1.2rem; 
            font-style: italic; 
            color: white;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="headline" class="big-text">For the girl who has everything...</div>
        
        <button id="playBtn">Except this</button>
        
        <div id="status" class="sub-text"></div>

         <div id="birthdayName" class="big-text" style="display:none;">Happy Birthday, Katie!</div>
    </div>

    <audio id="myAudio" preload="auto">
        <source src="shitty_birthday_flute.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('myAudio');
        const btn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        const headline = document.getElementById('headline');
        const bdayName = document.getElementById('birthdayName');

        btn.addEventListener('click', function() {
            audio.play().then(() => {
                // Change Button Text

                status.innerText = "But you deserve it";
                btn.innerText = "I know, it's awful...";
                btn.style.background = "#ff0436"; // Darken button so text above/below pops
                
                // Show "Happy Birthday, Katie!" in the same big style
                bdayName.style.display = "block";
                
                // Show the magic line
            }).catch((error) => {
                status.innerText = "Tap again!";
            });
        }, { once: true });
    </script>

</body>
</html>
