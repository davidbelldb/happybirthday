<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Katie!</title>
    <style>
        body { margin: 0; background: #2e004f; color: white; overflow: hidden; cursor: pointer; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0; transition: opacity 1.5s ease; pointer-events: none; }
        .card { z-index: 5; text-align: center; }
        button { padding: 16px 40px; font-size: 1.5rem; cursor: pointer; border-radius: 50px; border: none; background: #5ee788; color: #2e004f; font-weight: 900; box-shadow: 0 10px 20px rgba(0,0,0,0.3); position: relative; z-index: 30; }
        #bdayContainer { position: absolute; top: 10%; width: 100%; font-size: 3.5rem; font-weight: 900; text-align: center; z-index: 10; pointer-events: none; }
        .word { display: inline-block; opacity: 0; transition: opacity 0.8s ease; margin: 0 5px; filter: blur(8px); }
        .fade-in { opacity: 1 !important; filter: blur(0px) !important; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="bdayContainer">
        <span class="word">Happy</span>
        <span class="word">Birthday*</span>
        <span class="word">Katie!</span>
    </div>

    <div id="mainCard" class="card">
        <button id="playBtn"> This. </button>
    </div>

    <audio id="myAudio" preload="auto"><source src="shitty_birthday_flute.mp3" type="audio/mpeg"></audio>
    <audio id="duckAudio" preload="auto"><source src="duck_quack.mp3" type="audio/mpeg"></audio>
    <audio id="bgQuackAudio" preload="auto"><source src="quack_me.mp3" type="audio/mpeg"></audio>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        const container = document.getElementById('canvas-container');
        const btn = document.getElementById('playBtn');
        const bars = [];

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const loader = new THREE.TextureLoader();
        
        // Fix 1: Properly load the texture and set it to repeat/wrap
        const texture = loader.load('front.png');
        
        // Fix 2: Create a material for the "ends" using a cropped version of your image 
        // We'll use a color that matches the orange crimp for the sides
        const orangeEnd = new THREE.MeshStandardMaterial({ color: 0xe67e22, roughness: 0.3, metalness: 0.4 });
        const purpleTop = new THREE.MeshStandardMaterial({ color: 0x4b0082, roughness: 0.3, metalness: 0.2 });

        const frontMat = new THREE.MeshStandardMaterial({ map: loader.load('front.png'), roughness: 0.2, metalness: 0.3 });
        const backMat = new THREE.MeshStandardMaterial({ map: loader.load('back.png'), roughness: 0.2, metalness: 0.3 });

        // Fix 3: Material Array (Right, Left, Top, Bottom, Front, Back)
        // This puts orange on the thin side "ends" so it looks like a wrapper!
        const materials = [
            orangeEnd, // Right (the crimped bit)
            orangeEnd, // Left (the crimped bit)
            purpleTop, // Top
            purpleTop, // Bottom
            frontMat,  // Front
            backMat    // Back
        ];

        // Fix 4: Slender Geometry
        const geometry = new THREE.BoxGeometry(4, 1.2, 0.3);

        for (let i = 0; i < 10; i++) {
            const bar = new THREE.Mesh(geometry, materials);
            bar.position.set((Math.random() - 0.5) * 12, (Math.random() - 0.5) * 8, (Math.random() - 0.5) * 4);
            bar.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            
            bar.userData = { 
                speedX: (Math.random() - 0.5) * 0.01, 
                speedY: 0.02 + Math.random() * 0.02 
            };
            
            scene.add(bar);
            bars.push(bar);
        }

        // Fix 5: Dramatic lighting to show the wrapper edges
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        scene.add(hemiLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        camera.position.z = 10;

        function animate() {
            requestAnimationFrame(animate);
            bars.forEach(bar => {
                bar.rotation.y += bar.userData.speedY;
                bar.rotation.x += bar.userData.speedX;
            });
            renderer.render(scene, camera);
        }
        animate();

        btn.addEventListener('click', () => { container.style.opacity = "1"; });
    </script>

    <script>
        // Audio/UI Logic
        const audio = document.getElementById('myAudio');
        const quack = document.getElementById('duckAudio');
        const bgQuack = document.getElementById('bgQuackAudio');
        const btn = document.getElementById('playBtn');
        const words = document.querySelectorAll('.word');

        btn.addEventListener('click', function firstClick() {
            audio.play();
            quack.play();
            btn.innerText = "It's a chocolate storm!";
            words.forEach((word, index) => {
                setTimeout(() => word.classList.add('fade-in'), 600 + (index * 600)); 
            });
            btn.removeEventListener('click', firstClick);
        });

        document.body.addEventListener('click', (e) => {
            if (e.target !== btn) { bgQuack.currentTime = 0; bgQuack.play().catch(()=>{}); }
        });
    </script>
</body>
</html>
