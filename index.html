<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Katie!</title>
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body { 
            background: #4b0082; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            text-align: center;
            overflow: hidden;
            cursor: pointer;
        }

        #canvas-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .card {
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5;
        }

        .headline { 
            font-size: 2.2rem; 
            font-weight: bold; 
            line-height: 1.2;
            transition: opacity 0.5s ease;
        }

        #bdayContainer {
            position: absolute;
            top: 18%; 
            width: 100%;
            font-size: 4.0rem; 
            font-weight: 900;
            line-height: 1.1;
            z-index: 10;
            pointer-events: none;
        }

        button { 
            padding: 18px 54px; 
            font-size: 1.8rem; 
            cursor: pointer; 
            border-radius: 14px; 
            border: none; 
            background: #5ee788; 
            color: white; 
            font-weight: bold; 
            transition: all 0.5s ease;
            -webkit-tap-highlight-color: transparent;
            min-width: 280px;
            position: relative;
            z-index: 30; 
        }

        /* Shared style for final sequence buttons */
        #finalBtn, #stopBtn, #lastBtn {
            display: none;
            background: #ffa500; /* Orange */
            color: #4b0082;      /* Purple */
        }

        .status { 
            font-size: 0.8rem; 
            opacity: 0; 
            transition: opacity 1s ease;
            margin-top: 10px;
            padding: 0 10px;
        }

        .word {
            display: inline-block;
            opacity: 0;
            transition: opacity 0.8s ease;
            margin: 0 8px;
            filter: blur(8px);
        }

        .fade-in { 
            opacity: 1 !important; 
            filter: blur(0px) !important;
        }

        .duck-walker {
            position: absolute;
            width: 100%;
            overflow: hidden;
            pointer-events: none;
            display: flex;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        #topPond { top: 0px; padding-top: 10px; }
        #bottomPond { bottom: 0px; padding-bottom: 10px; }

        .duck-line { display: flex; white-space: nowrap; }
        .bottom-anim { animation: duckLoopRightToLeft 12s linear infinite; }
        .top-anim { animation: duckLoopLeftToRight 12s linear infinite; }

        .duck-image {
            height: 70px; 
            width: auto;
            margin: 0 15px; 
            opacity: 0.9;
        }

        .tap-hint {
            position: absolute;
            font-weight: 900;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            pointer-events: none;
            z-index: 25;
            animation: pulse 1.5s ease-in-out infinite;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 0.3; }
        }

        @keyframes duckLoopRightToLeft {
            0% { transform: translateX(0); } 
            100% { transform: translateX(-50%); } 
        }

        @keyframes duckLoopLeftToRight {
            0% { transform: translateX(-50%); } 
            100% { transform: translateX(0); } 
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="topPond" class="duck-walker">
        <div class="duck-line top-anim">
            <img src="duck_2.png" class="duck-image"><img src="duck-3.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck-3.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck-3.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck-3.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck-3.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck-3.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck-3.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck-3.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck-3.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck-3.png" class="duck-image">
        </div>
    </div>

    <div id="bdayContainer">
        <span class="word">Happy</span>
        <span class="word">Birthday*</span>
        <span class="word">Katie!</span>
    </div>

    <div id="mainCard" class="card">
        <div id="introText" class="headline">Let's be honest, 160 bags of Yorkshire Gold isn't too bad, but your bday was still missing...</div>
        <button id="playBtn"> This. </button>
        <button id="finalBtn">Until next year!</button>
        <button id="stopBtn">Seriously.</button>
        <button id="lastBtn">Stop clicking!</button>
        <div id="status" class="status">*Better late than never, right? But look. You deserve it. Along with a box of biscuits and a bag of coffee.</div>
    </div>

    <div id="bottomPond" class="duck-walker">
        <div class="duck-line bottom-anim">
            <img src="duck.png" class="duck-image"><img src="duck-1.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck-1.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck-1.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck-1.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck-1.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck-1.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck-1.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck-1.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck-1.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck-1.png" class="duck-image">
        </div>
    </div>

    <audio id="myAudio" preload="auto"><source src="shitty_birthday_flute.mp3" type="audio/mpeg"></audio>
    <audio id="duckAudio" preload="auto"><source src="duck_quack.mp3" type="audio/mpeg"></audio>
    <audio id="encoreAudio" preload="auto"><source src="quacky_bday.mp3" type="audio/mpeg"></audio>
    <audio id="bgQuackAudio" preload="auto"><source src="quack_me.mp3" type="audio/mpeg"></audio>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        camera.position.z = 12;

        const bars = [];
        const loader = new GLTFLoader();

        window.spawnBars = function() {
            document.getElementById('canvas-container').style.opacity = "1";
            loader.load('bar.glb', (gltf) => {
                for (let i = 0; i < 27; i++) {
                    const bar = gltf.scene.clone();
                    bar.scale.set(0.6, 0.6, 0.6); 
                    bar.position.set((Math.random() - 0.5) * 15, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 5);
                    bar.userData = {
                        rotX: Math.random() * 0.04 + 0.02,
                        rotY: Math.random() * 0.04 + 0.02,
                        speedX: (Math.random() - 0.5) * 0.02,
                        speedY: (Math.random() - 0.5) * 0.02
                    };
                    scene.add(bar);
                    bars.push(bar);
                }
            });
        };

        function animate() {
            requestAnimationFrame(animate);
            bars.forEach(bar => {
                bar.rotation.x += bar.userData.rotX;
                bar.rotation.y += bar.userData.rotY;
                bar.position.x += bar.userData.speedX;
                bar.position.y += bar.userData.speedY;
                if (Math.abs(bar.position.x) > 12) bar.userData.speedX *= -1;
                if (Math.abs(bar.position.y) > 8) bar.userData.speedY *= -1;
            });
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

    <script>
        const audio = document.getElementById('myAudio');
        const quack = document.getElementById('duckAudio');
        const encore = document.getElementById('encoreAudio');
        const bgQuack = document.getElementById('bgQuackAudio');
        const btn = document.getElementById('playBtn');
        const finalBtn = document.getElementById('finalBtn');
        const stopBtn = document.getElementById('stopBtn');
        const lastBtn = document.getElementById('lastBtn');
        const status = document.getElementById('status');
        const introText = document.getElementById('introText');
        const topPond = document.getElementById('topPond');
        const bottomPond = document.getElementById('bottomPond');
        const words = document.querySelectorAll('.word');

        document.body.addEventListener('click', function(e) {
            if (e.target.tagName !== 'BUTTON') {
                bgQuack.currentTime = 0; 
                bgQuack.play().catch(err => {});
            }
        });

        function createHints() {
            for(let i=0; i<8; i++) {
                const hint = document.createElement('div');
                hint.className = 'tap-hint';
                hint.innerText = 'TAP';
                hint.style.left = Math.random() * 80 + 10 + '%';
                hint.style.top = Math.random() * 80 + 10 + '%';
                hint.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(hint);
            }
        }

        btn.addEventListener('click', function firstClick(e) {
            e.stopPropagation(); 
            audio.play();
            quack.play();

            Promise.all([audio.play(), quack.play()]).then(() => {
                introText.style.opacity = "0";
                btn.innerText = "I know, it's awful.";
                btn.style.background = "#fa233b"; 
                status.style.opacity = "0.9";
                topPond.style.opacity = "1";
                bottomPond.style.opacity = "1";

                words.forEach((word, index) => {
                    setTimeout(() => { word.classList.add('fade-in'); }, 600 + (index * 600)); 
                });

                if(window.spawnBars) window.spawnBars();

                btn.removeEventListener('click', firstClick);
                
                btn.addEventListener('click', function secondClick(e) {
                    e.stopPropagation();
                    encore.currentTime = 0;
                    encore.play();
                    btn.innerText = "Quite terrible.";
                    createHints();
                    btn.removeEventListener('click', secondClick);

                    btn.addEventListener('click', function thirdClick(e) {
                        e.stopPropagation();
                        btn.innerText = "What? That's it.";
                        btn.style.opacity = "0.7";
                        
                        btn.removeEventListener('click', thirdClick);
                        btn.addEventListener('click', function finalSwap(e) {
                            e.stopPropagation();
                            btn.style.display = "none";
                            finalBtn.style.display = "block";
                        });
                    });
                });
            });
        });

        // Sequence: Until next year -> Seriously. -> Stop clicking!
        finalBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            finalBtn.style.display = "none";
            stopBtn.style.display = "block";
        });

        stopBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            stopBtn.style.display = "none";
            lastBtn.style.display = "block";
        });
    </script>
</body>
</html>
