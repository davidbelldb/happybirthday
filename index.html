<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday!</title>
    <style>
        body { 
            background: #0f0f0f; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .card {
            text-align: center;
            padding: 20px;
        }
        h1 { font-size: 2.2rem; margin-bottom: 25px; }
        button { 
            padding: 22px 60px; 
            font-size: 1.6rem; 
            cursor: pointer; 
            border-radius: 50px; 
            border: none; 
            background: linear-gradient(45deg, #ff4757, #ff6b81); 
            color: white; 
            font-weight: bold; 
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.92); opacity: 0.9; }
        .status { margin-top: 25px; color: #888; font-size: 1rem; font-style: italic; min-height: 1.2em; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎂 Tap to open your gift!</h1>
        <button id="playBtn">OPEN 🎁</button>
        <div id="status" class="status"></div>
    </div>

    <audio id="myAudio" preload="auto">
        <source src="shitty_birthday_flute.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('myAudio');
        const btn = document.getElementById('playBtn');
        const status = document.getElementById('status');

        btn.addEventListener('click', function() {
            status.innerText = "Loading the masterpiece...";
            
            // Re-attempting to play for iOS stability
            audio.play().then(() => {
                btn.innerText = "🎵 Playing!";
                btn.style.background = "#2ed573";
                status.innerText = "Pure talent.";
            }).catch((error) => {
                console.log("Error:", error);
                status.innerText = "Tap again!";
            });
        }, { once: true });
    </script>

</body>
</html>
