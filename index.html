<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Katie!</title>
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body { 
            background: #4b0082; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            text-align: center;
            overflow: hidden;
        }

        .card {
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5;
        }

        .slide-down { transform: translateY(60px); }

        .headline { 
            font-size: 2.2rem; 
            font-weight: bold; 
            line-height: 1.2;
            transition: opacity 0.5s ease;
        }

        #bdayContainer {
            position: absolute;
            top: 18%; 
            width: 100%;
            font-size: 4.4rem; 
            font-weight: 900;
            line-height: 1.1;
            z-index: 10;
            pointer-events: none;
        }

        button { 
            padding: 22px 60px; 
            font-size: 1.6rem; 
            cursor: pointer; 
            border-radius: 14px; 
            border: none; 
            background: #5ee788; 
            color: white; 
            font-weight: bold; 
            transition: all 0.5s ease;
            -webkit-tap-highlight-color: transparent;
            min-width: 280px;
        }

        .status { 
            font-size: 1.2rem; 
            font-style: italic; 
            opacity: 0; 
            transition: opacity 1s ease;
            margin-top: 10px;
        }

        .word {
            display: inline-block;
            opacity: 0;
            transition: opacity 0.8s ease;
            margin: 0 8px;
            filter: blur(8px);
        }

        .fade-in { 
            opacity: 1 !important; 
            filter: blur(0px) !important;
        }

        /* --- THE DUCK PONDS --- */
        .duck-walker {
            position: absolute;
            width: 100%;
            overflow: hidden;
            pointer-events: none;
            display: flex;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        /* Top Pond - Left to Right */
        #topPond {
            top: 0px;
            padding-top: 10px;
        }

        /* Bottom Pond - Right to Left */
        #bottomPond {
            bottom: 0px;
            padding-bottom: 10px;
        }

        .duck-line {
            display: flex;
            white-space: nowrap;
        }

        /* Bottom ducks right-to-left */
        .bottom-anim { animation: duckLoopRightToLeft 12s linear infinite; }
        
        /* Top ducks left-to-right */
        .top-anim { animation: duckLoopLeftToRight 12s linear infinite; }

        .duck-image {
            height: 70px; 
            width: auto;
            margin: 0 15px; 
            opacity: 0.9;
        }

        @keyframes duckLoopRightToLeft {
            0% { transform: translateX(0); } 
            100% { transform: translateX(-50%); } 
        }

        @keyframes duckLoopLeftToRight {
            0% { transform: translateX(-50%); } 
            100% { transform: translateX(0); } 
        }

    </style>
</head>
<body>

    <div id="topPond" class="duck-walker">
        <div class="duck-line top-anim">
            <img src="duck_2.png" class="duck-image"><img src="duck_2.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck_2.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck_2.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck_2.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck_2.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck_2.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck_2.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck_2.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck_2.png" class="duck-image">
            <img src="duck_2.png" class="duck-image"><img src="duck_2.png" class="duck-image">
        </div>
    </div>

    <div id="bdayContainer">
        <span class="word">Happy</span>
        <span class="word">Birthday,</span>
        <span class="word">Katie!</span>
    </div>

    <div id="mainCard" class="card">
        <div id="introText" class="headline">For the girl who has everything...</div>
        <button id="playBtn">Except for this</button>
        <div id="status" class="status">But it's no less than you deserve!</div>
    </div>

    <div id="bottomPond" class="duck-walker">
        <div class="duck-line bottom-anim">
            <img src="duck.png" class="duck-image"><img src="duck.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck.png" class="duck-image">
            <img src="duck.png" class="duck-image"><img src="duck.png" class="duck-image">
        </div>
    </div>

    <audio id="myAudio" preload="auto">
        <source src="shitty_birthday_flute.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('myAudio');
        const btn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        const card = document.getElementById('mainCard');
        const introText = document.getElementById('introText');
        const topPond = document.getElementById('topPond');
        const bottomPond = document.getElementById('bottomPond');
        const words = document.querySelectorAll('.word');

        btn.addEventListener('click', function() {
            audio.play().then(() => {
                introText.style.opacity = "0";
                card.classList.add('slide-down');

                btn.innerText = "I know, it's awful";
                btn.style.background = "#fa233b"; 
                
                status.style.opacity = "0.9";
                
                // Show both duck ponds!
                topPond.style.opacity = "1";
                bottomPond.style.opacity = "1";

                words.forEach((word, index) => {
                    setTimeout(() => {
                        word.classList.add('fade-in');
                    }, 600 + (index * 600)); 
                });

            }).catch((error) => {
                console.log("Audio failed:", error);
                status.innerText = "Tap again to play!";
                status.style.opacity = "1";
            });
        }, { once: true });
    </script>

</body>
</html>
