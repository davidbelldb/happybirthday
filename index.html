<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Katie!</title>
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body { 
            background: #4b0082; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
            overflow: hidden;
        }

        .card {
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Reduced slide distance to close the gap with the top text */
        .slide-down { transform: translateY(60px); }

        .headline { 
            font-size: 2.2rem; 
            font-weight: bold; 
            color: white;
            line-height: 1.2;
            margin: 0;
            transition: opacity 0.5s ease;
        }

        /* Nudged down slightly from the very top to sit closer to the button */
        #bdayContainer {
            position: absolute;
            top: 18%; 
            width: 100%;
            font-size: 4.4rem; 
            font-weight: 900;
            color: white;
            line-height: 1.1;
            z-index: 10;
            pointer-events: none;
        }

        button { 
            padding: 22px 60px; 
            font-size: 1.6rem; 
            cursor: pointer; 
            border-radius: 14px; 
            border: none; 
            background: #fa233b; 
            color: white; 
            font-weight: bold; 
            transition: all 0.5s ease;
            -webkit-tap-highlight-color: transparent;
            min-width: 280px;
        }

        .status { 
            font-size: 1.2rem; 
            font-style: italic; 
            opacity: 0;
            transition: opacity 1s ease;
            margin-top: 10px;
        }

        .word {
            display: inline-block;
            opacity: 0;
            transition: opacity 0.8s ease;
            margin: 0 8px;
            filter: blur(8px);
        }

        .fade-in { 
            opacity: 1 !important; 
            filter: blur(0px) !important;
        }

    </style>
</head>
<body>

    <div id="bdayContainer">
        <span class="word">Happy</span>
        <span class="word">Birthday,</span>
        <span class="word">Katie!</span>
    </div>

    <div id="mainCard" class="card">
        <div id="introText" class="headline">For the girl who has everything...</div>
        <button id="playBtn">Except for this</button>
        <div id="status" class="status">but it's no less than you deserve!</div>
    </div>

    <audio id="myAudio" preload="auto">
        <source src="shitty_birthday_flute.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('myAudio');
        const btn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        const card = document.getElementById('mainCard');
        const introText = document.getElementById('introText');
        const words = document.querySelectorAll('.word');

        btn.addEventListener('click', function() {
            audio.play().then(() => {
                introText.style.opacity = "0";
                card.classList.add('slide-down');

                btn.innerText = "I know, it's awful";
                btn.style.background = #fa233b;
                
                status.style.opacity = "0.9";

                words.forEach((word, index) => {
                    setTimeout(() => {
                        word.classList.add('fade-in');
                    }, 600 + (index * 600)); 
                });

            }).catch((error) => {
                console.log("Audio play failed:", error);
            });
        }, { once: true });
    </script>

</body>
</html>
